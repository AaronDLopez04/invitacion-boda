<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block titulo %}
        Panel Administrativo
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<div class="admin-layout">

    <aside class="admin-sidebar">

        <div class="admin-brand">
            <h2>E & M</h2>
            <p>Eunice & Magdiel</p>
        </div>

        <nav class="admin-menu">

            <a href="{{ url_for('admin.dashboard') }}">
                🏠 Dashboard
            </a>

            <a href="{{ url_for('admin.nuevo_invitado') }}">
                ➕ Nuevo Invitado
            </a>

            <a href="{{ url_for('admin.configuracion_boda') }}">
                ⚙️ Configuración
            </a>

            <a href="{{ url_for('admin.multimedia') }}">
                📷 Multimedia
            </a>

            <a href="{{ url_for('admin.mesas') }}">
                🍽 Mesas
            </a>

            <a href="{{ url_for('admin.checkin') }}">
                📱 Check-in
            </a>

            <a href="{{ url_for('admin.plano') }}">
             🏛 Plano del salón
            </a>

            <a href="{{ url_for('admin.reporte_recepcion') }}">
            🖨 Reporte recepción
            </a>

            <a href="{{ url_for('admin.mi_cuenta') }}">
            👤 Mi cuenta
            </a>

            <a href="{{ url_for('admin.logout') }}" class="logout">
                🚪 Cerrar sesión
            </a>

        </nav>

    </aside>

    <main class="admin-content">

        {% block contenido %}
        {% endblock %}

    </main>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
