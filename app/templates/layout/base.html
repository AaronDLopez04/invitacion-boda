<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>

{% block titulo %}

Invitación

{% endblock %}

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link

    href="{{ url_for('static', filename='manifest.json') }}">

<link

<link
rel="stylesheet"
href="{{ url_for(

) }}">

</head>

{% endblock %}

<script

'static',
filename='js/main.js'
) }}">

</html>
