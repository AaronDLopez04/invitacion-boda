<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Invitación no disponible
    </title>

    <link
        rel="icon"
        href="{{ url_for('static', filename='favicon.png') }}">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>

        :root {

            --background: #f5f0e9;
            --card: rgba(255, 255, 255, .88);
            --primary: #806b57;
            --accent: #b59673;
            --text: #554b43;
            --muted: #7c736b;

        }


        * {

            box-sizing: border-box;
            margin: 0;
            padding: 0;

        }


        body {

            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background:
                radial-gradient(
                    circle at top,
                    rgba(181, 150, 115, .22),
                    transparent 45%
                ),
                var(--background);
            color: var(--text);
            font-family: "Montserrat", sans-serif;

        }


        .invitation-unavailable {

            width: min(100%, 680px);
            padding: 60px 45px;
            border: 1px solid rgba(181, 150, 115, .28);
            border-radius: 30px;
            background: var(--card);
            box-shadow: 0 24px 70px rgba(77, 62, 49, .1);
            text-align: center;

        }


        .invitation-icon {

            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: rgba(181, 150, 115, .15);
            color: var(--accent);
            font-family: "Cormorant Garamond", serif;
            font-size: 2.4rem;

        }


        .invitation-label {

            margin-bottom: 12px;
            color: var(--accent);
            font-size: .75rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;

        }


        h1 {

            margin-bottom: 20px;
            color: var(--primary);
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(2.8rem, 9vw, 4.6rem);
            font-weight: 600;
            line-height: .95;

        }


        .invitation-message {

            max-width: 530px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.9;

        }


        .invitation-help {

            max-width: 520px;
            margin: 30px auto 0;
            padding-top: 25px;
            border-top: 1px solid rgba(181, 150, 115, .22);
            color: var(--primary);
            font-size: .9rem;
            line-height: 1.7;

        }


        .ornament {

            display: block;
            margin-top: 28px;
            color: var(--accent);
            font-size: 1.1rem;

        }


        @media (max-width: 600px) {

            .invitation-unavailable {

                padding: 48px 23px;
                border-radius: 24px;

            }

        }

    </style>

</head>

<body>

    <main class="invitation-unavailable">

        <div class="invitation-icon">
            ♡
        </div>

        <p class="invitation-label">
            Invitación no disponible
        </p>

        <h1>
            Lo sentimos
        </h1>

        <p class="invitation-message">

            Esta invitación ya no existe o el enlace
            que utilizaste dejó de estar disponible.

        </p>

        <p class="invitation-help">

            Por favor, comunícate directamente con los novios
            para confirmar tus datos o solicitar un nuevo enlace
            de invitación.

        </p>

        <span class="ornament">
            ✦
        </span>

    </main>

</body>

</html>
